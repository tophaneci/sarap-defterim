<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Şarap Defterim</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0608;--surf:#1a0c10;--surf2:#221018;--bord:#3d1f28;
  --wine:#8b1a2a;--wineh:#c4304a;--gold:#c9a84c;--goldl:#e8c96e;
  --txt:#f0e6e8;--mut:#9a7a82;--wht:#fff8f9;
  --green:#1a5c35;--greenl:#4caf7d;
}
html{scroll-behavior:smooth}
body{font-family:'Josefin Sans',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(139,26,42,.08),transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(201,168,76,.05),transparent 50%);pointer-events:none;z-index:0}
.wrap{max-width:1100px;margin:0 auto;padding:0 16px;position:relative;z-index:1}
header{padding:28px 0 20px;border-bottom:1px solid var(--bord);margin-bottom:28px}
.hdr{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;flex-wrap:wrap}
.logo h1{font-family:'Cormorant Garamond',serif;font-size:clamp(1.9rem,6vw,3rem);font-weight:300;color:var(--wht);line-height:1}
.logo h1 em{color:var(--gold);font-style:italic}
.logo p{font-size:.62rem;letter-spacing:.25em;text-transform:uppercase;color:var(--mut);margin-top:4px}
.stats{display:flex;gap:20px}
.stat{text-align:center}
.stn{font-family:'Cormorant Garamond',serif;font-size:1.7rem;color:var(--gold);font-weight:300;line-height:1}
.stl{font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;color:var(--mut);margin-top:2px}
.tabs{display:flex;border-bottom:1px solid var(--bord);margin-bottom:24px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{display:none}
.tbtn{background:none;border:none;color:var(--mut);font-family:'Josefin Sans',sans-serif;font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;padding:10px 18px 12px;cursor:pointer;white-space:nowrap;position:relative;transition:color .2s;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.tbtn::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:2px;background:var(--wineh);transform:scaleX(0);transition:transform .25s}
.tbtn.on{color:var(--wht)}.tbtn.on::after{transform:scaleX(1)}
.panel{display:none}.panel.on{display:block}
.fcard{background:var(--surf);border:1px solid var(--bord);border-radius:2px;padding:24px;max-width:680px}
.ftit{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:300;font-style:italic;color:var(--wht);margin-bottom:20px}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fg{display:flex;flex-direction:column;gap:5px}
.fg.w2{grid-column:1/-1}
.lbl{font-size:.58rem;letter-spacing:.22em;text-transform:uppercase;color:var(--mut)}
input[type=text],
input[type=password],
input[type=number],
select,
textarea{
  background:var(--bg);border:1px solid var(--bord);color:var(--txt);font-family:'Josefin Sans',sans-serif;
  font-size:.88rem;padding:9px 12px;border-radius:1px;outline:none;transition:border-color .2s;width:100%;
  -webkit-appearance:none;appearance:none
}
input:focus,select:focus,textarea:focus{border-color:var(--wineh)}
select option{background:#1a0c10}
textarea{resize:vertical;min-height:80px;line-height:1.6}
.price-wrap{position:relative}
.price-wrap::before{content:'€';position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--mut);pointer-events:none;font-size:.88rem}
.price-wrap input{padding-left:26px}
.drop-area{border:1.5px dashed var(--bord);border-radius:2px;padding:18px;text-align:center;cursor:pointer;position:relative;background:var(--bg);transition:border-color .2s;overflow:hidden}
.drop-area:hover,.drop-area.drag{border-color:var(--wineh)}
.drop-area input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;font-size:0}
.drop-icon{font-size:1.6rem;display:block;margin-bottom:4px}
.drop-txt{font-size:.62rem;letter-spacing:.15em;text-transform:uppercase;color:var(--mut)}
.img-prev{display:none;margin-top:10px;position:relative}
.img-prev img{width:100%;max-height:200px;object-fit:cover;border-radius:1px;border:1px solid var(--bord);display:block}
.img-rmv{position:absolute;top:8px;right:8px;background:rgba(14,6,8,.9);border:1px solid var(--wineh);color:var(--wht);font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;padding:4px 10px;cursor:pointer;border-radius:1px;-webkit-tap-highlight-color:transparent}
.star-section{grid-column:1/-1}
.star-rows{display:flex;flex-direction:column;gap:8px;margin-top:6px}
.star-row{display:flex;align-items:center;gap:10px}
.srl{font-size:.58rem;letter-spacing:.15em;text-transform:uppercase;color:var(--mut);width:64px;flex-shrink:0}
.stars{display:flex;gap:4px}
.star{font-size:26px;color:var(--bord);cursor:pointer;line-height:1;user-select:none;-webkit-tap-highlight-color:transparent;transition:color .12s;padding:3px}
.star.on{color:var(--gold)}
.score-box{grid-column:1/-1;display:flex;align-items:center;gap:12px;background:var(--surf2);border:1px solid var(--bord);padding:14px 16px;border-radius:1px}
.score-n{font-family:'Cormorant Garamond',serif;font-size:2.8rem;color:var(--goldl);font-weight:300;line-height:1;min-width:52px}
.score-sub{display:flex;flex-direction:column;gap:3px}
.score-lbl{font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;color:var(--mut)}
.score-desc{font-family:'Cormorant Garamond',serif;font-size:.95rem;color:var(--wineh);font-style:italic}
.save-btn{margin-top:18px;background:var(--wine);border:1px solid var(--wineh);color:var(--wht);font-family:'Josefin Sans',sans-serif;font-size:.68rem;letter-spacing:.22em;text-transform:uppercase;padding:13px 30px;cursor:pointer;border-radius:1px;transition:background .25s;display:inline-block;-webkit-tap-highlight-color:transparent}
.save-btn:hover{background:var(--wineh)}
.save-btn:active{opacity:.85}
.save-btn.saved{background:var(--green);border-color:var(--greenl)}
.banner{display:none;align-items:center;gap:10px;background:#0d2419;border:1px solid var(--greenl);padding:12px 16px;border-radius:2px;margin-bottom:18px}
.banner.on{display:flex}
.banner-ico{font-size:1.1rem}
.banner-txt{flex:1}
.banner-name{font-family:'Cormorant Garamond',serif;font-size:1.05rem;color:#7ee8a2;font-style:italic}
.banner-sub{font-size:.58rem;letter-spacing:.15em;text-transform:uppercase;color:var(--greenl);margin-top:1px}
.banner-x{background:none;border:none;color:var(--greenl);cursor:pointer;font-size:.95rem;padding:0 4px;line-height:1}
.toolbar{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;align-items:center}
.fbtn{background:none;border:1px solid var(--bord);color:var(--mut);font-family:'Josefin Sans',sans-serif;font-size:.58rem;letter-spacing:.15em;text-transform:uppercase;padding:6px 12px;cursor:pointer;border-radius:1px;transition:all .2s;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.fbtn.on,.fbtn:hover{border-color:var(--wineh);color:var(--wht);background:rgba(139,26,42,.15)}
.tr{display:flex;gap:8px;margin-left:auto;align-items:center}
.srch{max-width:160px;padding:6px 10px;font-size:.78rem}
.srt{max-width:140px;font-size:.65rem;padding:6px 10px;background:var(--surf)}
.vtog{display:flex;gap:3px}
.vbtn{background:none;border:1px solid var(--bord);color:var(--mut);padding:6px 10px;cursor:pointer;border-radius:1px;font-size:.9rem;transition:all .2s;line-height:1;-webkit-tap-highlight-color:transparent}
.vbtn.on,.vbtn:hover{border-color:var(--wineh);color:var(--wht);background:rgba(139,26,42,.15)}
.wine-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px}
.wcard{background:var(--surf);border:1px solid var(--bord);border-radius:2px;cursor:pointer;position:relative;overflow:hidden;transition:border-color .2s;-webkit-tap-highlight-color:transparent}
.wcard::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--wine)}
.wcard:active{border-color:var(--wineh)}.wcard:active::before{background:var(--wineh)}
.wcard-img{width:100%;height:130px;object-fit:cover;display:block;border-bottom:1px solid var(--bord)}
.wcard-body{padding:14px}
.wcard-badge{font-size:.56rem;letter-spacing:.16em;text-transform:uppercase;color:var(--mut);margin-bottom:5px}
.wcard-name{font-family:'Cormorant Garamond',serif;font-size:1.15rem;color:var(--wht);line-height:1.3;margin-bottom:2px}
.wcard-prod{font-size:.72rem;color:var(--mut);margin-bottom:10px}
.wcard-notes{font-family:'Cormorant Garamond',serif;font-size:.88rem;color:#c8a8b0;font-style:italic;line-height:1.5;margin-bottom:10px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.wcard-foot{display:flex;justify-content:space-between;align-items:center;padding-top:10px;border-top:1px solid var(--bord)}
.wcard-score{font-family:'Cormorant Garamond',serif;font-size:1.6rem;color:var(--gold);font-weight:300;line-height:1}
.wcard-score span{font-size:.75rem;color:var(--mut)}
.wcard-stars{font-size:11px;color:var(--gold)}
.wcard-date{font-size:.58rem;letter-spacing:.1em;color:var(--mut)}
.wcard-price{font-family:'Cormorant Garamond',serif;font-size:.95rem;color:var(--goldl)}
.del-btn{position:absolute;top:8px;right:8px;background:rgba(14,6,8,.85);border:1px solid var(--bord);color:var(--mut);cursor:pointer;font-size:11px;padding:5px 8px;border-radius:1px;transition:all .2s;line-height:1;z-index:2;-webkit-tap-highlight-color:transparent;min-width:28px;min-height:28px}
.del-btn:active{color:var(--wineh);border-color:var(--wineh)}
.wine-list{display:flex;flex-direction:column;gap:1px}
.wrow{background:var(--surf);border:1px solid var(--bord);border-radius:1px;display:flex;align-items:center;position:relative;overflow:hidden;cursor:pointer;transition:border-color .2s;-webkit-tap-highlight-color:transparent}
.wrow::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--wine)}
.wrow:active{border-color:var(--wineh)}.wrow:active::before{background:var(--wineh)}
.wrow-thumb{width:58px;height:58px;object-fit:cover;flex-shrink:0;border-right:1px solid var(--bord)}
.wrow-ph{width:58px;height:58px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;border-right:1px solid var(--bord);background:var(--surf2)}
.wrow-body{flex:1;padding:10px 12px;min-width:0}
.wrow-name{font-family:'Cormorant Garamond',serif;font-size:1.05rem;color:var(--wht);line-height:1.2}
.wrow-meta{font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--mut);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wrow-right{padding:10px 8px 10px 0;text-align:right;flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:3px}
.wrow-score{font-family:'Cormorant Garamond',serif;font-size:1.4rem;color:var(--gold);font-weight:300;line-height:1}
.wrow-score span{font-size:.7rem;color:var(--mut)}
.wrow-price{font-size:.68rem;color:var(--mut)}
.wrow-del{background:none;border:none;color:var(--bord);cursor:pointer;font-size:12px;padding:6px 8px;line-height:1;transition:color .2s;-webkit-tap-highlight-color:transparent;min-width:28px;min-height:28px}
.wrow-del:active{color:var(--wineh)}
.empty{text-align:center;padding:60px 16px;color:var(--mut);grid-column:1/-1}
.empty-ico{font-size:2.4rem;margin-bottom:10px;opacity:.4}
.empty h3{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:300;font-style:italic;color:var(--mut);margin-bottom:6px}
.empty p{font-size:.7rem;letter-spacing:.1em}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:200;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px}
.overlay.on{display:flex;align-items:flex-start;justify-content:center}
.modal{background:var(--surf);border:1px solid var(--bord);border-radius:2px;width:100%;max-width:540px;margin:auto;position:relative}
.modal-img{width:100%;max-height:240px;object-fit:cover;display:block;border-bottom:1px solid var(--bord)}
.modal-body{padding:20px}
.mclose{position:absolute;top:10px;right:10px;background:rgba(14,6,8,.9);border:1px solid var(--bord);color:var(--wht);width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center;z-index:3;-webkit-tap-highlight-color:transparent;line-height:1}
.mclose:active{border-color:var(--wineh)}
.m-badge{font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;color:var(--mut);margin-bottom:6px}
.m-name{font-family:'Cormorant Garamond',serif;font-size:1.7rem;font-weight:300;color:var(--wht);line-height:1.2;margin-bottom:3px}
.m-prod{font-size:.8rem;color:var(--mut);margin-bottom:18px}
.m-scorebox{display:flex;align-items:center;gap:14px;background:var(--surf2);border:1px solid var(--bord);padding:14px;border-radius:1px;margin-bottom:16px}
.m-score-big{font-family:'Cormorant Garamond',serif;font-size:2.8rem;color:var(--goldl);font-weight:300;line-height:1}
.m-score-stars{font-size:15px;color:var(--gold)}
.m-score-lbl{font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;color:var(--mut);margin-top:3px}
.m-cats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.m-cat{background:var(--surf2);border:1px solid var(--bord);padding:9px 11px;border-radius:1px}
.m-cat-lbl{font-size:.55rem;letter-spacing:.15em;text-transform:uppercase;color:var(--mut);margin-bottom:3px}
.m-cat-stars{font-size:12px;color:var(--gold)}
.m-chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.m-chip{background:var(--surf2);border:1px solid var(--bord);padding:7px 12px;border-radius:1px;text-align:center}
.m-chip-val{font-family:'Cormorant Garamond',serif;font-size:1.05rem;color:var(--goldl)}
.m-chip-lbl{font-size:.55rem;letter-spacing:.15em;text-transform:uppercase;color:var(--mut);margin-top:2px}
.m-sec{margin-bottom:14px}
.m-sec-lbl{font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;color:var(--mut);margin-bottom:5px}
.m-sec-val{font-family:'Cormorant Garamond',serif;font-size:1rem;color:var(--txt);line-height:1.65;font-style:italic}
.m-del{background:none;border:1px solid var(--bord);color:var(--mut);font-family:'Josefin Sans',sans-serif;font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;padding:9px;cursor:pointer;border-radius:1px;width:100%;margin-top:6px;transition:all .2s;-webkit-tap-highlight-color:transparent}
.m-del:active{border-color:var(--wineh);color:var(--wineh)}
.secondary-sync{opacity:.75}
.secondary-sync:hover{opacity:1}
input:-webkit-autofill,
input:-webkit-autofill:hover,
input:-webkit-autofill:focus,
input:-webkit-autofill:active{
  -webkit-text-fill-color: var(--txt);
  -webkit-box-shadow: 0 0 0 1000px var(--bg) inset;
  box-shadow: 0 0 0 1000px var(--bg) inset;
  transition: background-color 9999s ease-in-out 0s;
}
input:-moz-autofill{
  box-shadow: 0 0 0 1000px var(--bg) inset !important;
  -moz-text-fill-color: var(--txt) !important;
  border:1px solid var(--bord) !important;
}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--surf2);border:1px solid var(--wineh);color:var(--wht);font-size:.72rem;letter-spacing:.1em;padding:10px 20px;border-
